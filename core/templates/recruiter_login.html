{% extends 'base.html' %}

{% block title %}AI HirePanel - Recruiter Access Gate{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; flex-grow: 1;">
    <div class="card" style="max-width: 450px; width: 100%; padding: 16px 18px; border: 1px solid rgba(127, 0, 255, 0.2); position: relative; background: rgba(20, 30, 55, 0.65); margin-bottom: 0;">
        <div style="position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(127, 0, 255, 0.15) 0%, transparent 70%); pointer-events: none; z-index: 1;"></div>
        
        <div style="position: relative; z-index: 2;">
            <div style="margin: 0 auto 24px; width: 64px; height: 64px; border-radius: 50%; background: rgba(127, 0, 255, 0.08); border: 2px solid #7f00ff; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(127, 0, 255, 0.2);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 26px; text-align: center; margin-bottom: 8px; background: linear-gradient(135deg, #00f2fe 0%, #7f00ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Recruiter Portal Access
            </h1>
            <p style="color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 28px;">
                Please enter the security passkey to view dashboard data.
            </p>

            {% if error_message %}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px;">
                <span style="color: #f87171; font-weight: bold; font-size: 14px;">⚠️</span>
                <span style="color: var(--text-main); font-size: 13.5px;">{{ error_message }}</span>
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="passkey" style="margin-bottom: 8px; display: block; font-size: 13px; font-weight: 600; color: var(--text-main);">Security Passkey</label>
                    <input type="password" id="passkey" name="passkey" class="form-control" placeholder="Enter recruiter passkey" required style="width: 100%; border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 8px; background: rgba(0, 0, 0, 0.25); color: var(--text-main);">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border-radius: 8px;">
                    Verify Passkey
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
